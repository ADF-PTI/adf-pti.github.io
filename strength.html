<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADF PTI — Strength Program Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1f16;--ink2:#242920;--red:#c8392b;--red2:#e05a40;--orange:#e8a020;--cream:#f5f2eb;--sand:#ede8dc;--card:#ffffff;--border:#d0c8b8;--muted:#7a7060;--text:#1a1a16;--text2:#55504a;--radius:4px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
header{background:var(--ink);color:#fff;padding:0 2rem;display:flex;align-items:stretch;border-bottom:3px solid var(--red);}
.hflag{background:var(--red);width:6px;margin-right:1.5rem;}
.htext{padding:1.25rem 0;}
.hey{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:4px;}
header h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1;}
header h1 span{color:var(--red2);}
.hsub{font-size:12px;color:#aaa;margin-top:4px;font-weight:300;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hbadge{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:4px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#aaa;font-weight:700;}
.hlink{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:4px 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#aaa;font-weight:600;text-decoration:none;transition:background .15s;}
.hlink:hover{background:rgba(255,255,255,0.12);}
.layout{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 72px);}
.sidebar{background:var(--sand);border-right:1px solid var(--border);padding:1.5rem;overflow-y:auto;}
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:.75rem;padding-bottom:5px;border-bottom:1px solid var(--border);}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem;}
.fg label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink2);}
input,select,textarea{font-family:'Barlow',sans-serif;font-size:13.5px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);width:100%;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(200,57,43,.1);}
textarea{resize:vertical;min-height:60px;}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem;}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:.75rem;}
.fgrid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:.75rem;}
.btn-gen{width:100%;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .15s;margin-top:.75rem;}
.btn-gen:hover{background:var(--red);}
.btn-gen:disabled{background:#999;cursor:not-allowed;}
.output{padding:2rem;overflow-y:auto;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;text-align:center;opacity:.45;}
.empty-icon{width:64px;height:64px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1rem;font-size:28px;}
.empty h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.empty p{font-size:13px;color:var(--muted);}
.rpt-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--ink);}
.rpt-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1.1;}
.rpt-title span{color:var(--red);}
.rpt-meta{font-size:12px;color:var(--muted);margin-top:4px;}
.btn-sec{background:var(--card);color:var(--ink);border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-sec:hover{background:var(--sand);}
.stats-row{background:var(--ink);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;}
.stat-item label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#aaa;display:block;margin-bottom:3px;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--orange);}
.ai-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;}
.ai-section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);margin-bottom:.75rem;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.ai-section-title::before{content:'';display:inline-block;width:4px;height:13px;background:var(--red);border-radius:2px;flex-shrink:0;}
.ai-badge{display:inline-block;background:var(--red);color:#fff;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:2px;font-weight:700;margin-bottom:.75rem;}
.ai-output{font-size:13.5px;line-height:1.7;color:var(--text);font-family:'Barlow',sans-serif;}
.ai-output h2{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink);margin:1.5rem 0 .5rem;padding-bottom:4px;border-bottom:2px solid var(--red);}
.ai-output h3{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--red);margin:1rem 0 .4rem;}
.ai-output p{margin-bottom:.6rem;}
.ai-output ul{margin:.4rem 0 .8rem 0;padding:0;list-style:none;}
.ai-output ul li{padding:4px 0 4px 16px;position:relative;border-bottom:1px solid rgba(0,0,0,.04);}
.ai-output ul li::before{content:'▸';position:absolute;left:0;color:var(--red);font-size:10px;top:6px;}
.ai-output strong{font-weight:700;color:var(--ink);}
.ai-output.streaming::after{content:'▋';animation:blink .7s infinite;color:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.loading-strip{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:.75rem;display:none;}
.loading-fill{height:100%;background:var(--red);animation:sweep 1.5s ease-in-out infinite;}
@keyframes sweep{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.disclaimer{background:var(--sand);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-top:2rem;font-size:12px;color:var(--muted);font-style:italic;}
@media(max-width:900px){.layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="hflag"></div>
  <div class="htext">
    <div class="hey">Australian Defence Force</div>
    <h1>PTI <span>Strength</span> Program Builder</h1>
    <div class="hsub">AI-Powered Strength & Conditioning Program Generator</div>
  </div>
  <div class="hright">
    <a class="hlink" href="index.html">← Back to Tools</a>
    <div class="hbadge">AI Powered</div>
  </div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="slabel">Member Details</div>
    <div class="fgrid3">
      <div class="fg"><label>Name</label><input type="text" id="name" placeholder="e.g. CPL Smith"></div>
      <div class="fg"><label>Age</label><input type="number" id="age" placeholder="26" min="17" max="65"></div>
      <div class="fg"><label>Bodyweight (kg)</label><input type="number" id="bw" placeholder="85"></div>
    </div>

    <div class="slabel">Training Goal</div>
    <div class="fg">
      <select id="goal">
        <option>General Military Fitness</option>
        <option>Strength Foundation (novice lifter)</option>
        <option>Hypertrophy / Mass Gain</option>
        <option>Strength-Endurance</option>
        <option>Maximal Strength</option>
        <option>Selection Preparation</option>
        <option>Return to Training Post-Injury</option>
      </select>
    </div>

    <div class="slabel">Program Setup</div>
    <div class="fgrid3">
      <div class="fg"><label>Experience</label>
        <select id="exp"><option>Beginner (&lt;1 yr)</option><option selected>Intermediate (1–3 yr)</option><option>Advanced (3+ yr)</option></select>
      </div>
      <div class="fg"><label>Duration</label>
        <select id="weeks"><option>4</option><option selected>6</option><option>8</option><option>10</option><option>12</option></select>
      </div>
      <div class="fg"><label>Sessions/Wk</label>
        <select id="sessions"><option>2</option><option selected>3</option><option>4</option><option>5</option></select>
      </div>
    </div>
    <div class="fgrid2">
      <div class="fg"><label>Equipment</label>
        <select id="equip"><option>Bodyweight only</option><option>Dumbbells / basic</option><option selected>Full barbell gym</option><option>Commercial gym (all)</option></select>
      </div>
      <div class="fg"><label>Split Preference</label>
        <select id="split"><option>Full Body</option><option selected>Upper / Lower</option><option>Push / Pull / Legs</option><option>AI decides best split</option></select>
      </div>
    </div>

    <div class="slabel">Current Lifts (leave blank if unknown)</div>
    <div class="fgrid2">
      <div class="fg"><label>Squat 1RM (kg)</label><input type="number" id="squat" placeholder="e.g. 100"></div>
      <div class="fg"><label>Bench 1RM (kg)</label><input type="number" id="bench" placeholder="e.g. 80"></div>
      <div class="fg"><label>Deadlift 1RM (kg)</label><input type="number" id="deadlift" placeholder="e.g. 120"></div>
      <div class="fg"><label>OHP 1RM (kg)</label><input type="number" id="ohp" placeholder="e.g. 60"></div>
    </div>

    <div class="fg"><label>Injuries / Notes / Constraints</label>
      <textarea id="notes" placeholder="e.g. Lower back sensitivity, no overhead press, ADF morning PT 3x/week already, limited to 60 min sessions"></textarea>
    </div>
    <button class="btn-gen" id="genBtn" onclick="generate()">Generate Strength Program</button>
  </div>

  <div class="output">
    <div class="empty" id="emptyState">
      <div class="empty-icon">⚙️</div>
      <h2>No Program Generated</h2>
      <p>Enter your details and press<br>Generate Strength Program.</p>
    </div>
    <div id="reportArea" style="display:none;"></div>
  </div>
</div>

<script>
function v(id){return document.getElementById(id).value;}
async function generate(){
  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.textContent='Generating...';
  const now=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('emptyState').style.display='none';
  const ra=document.getElementById('reportArea');
  ra.style.display='block';
  ra.innerHTML=`
    <div class="rpt-header">
      <div><div class="rpt-title">Strength <span>Program</span></div><div class="rpt-meta">Generated ${now} — ${v('name')||'Member'} — ${v('weeks')} weeks — ${v('goal')}</div></div>
      <div style="display:flex;gap:8px;">
        <button class="btn-sec" onclick="window.print()">Print / Save PDF</button>
        <button class="btn-sec" onclick="document.getElementById('reportArea').style.display='none';document.getElementById('emptyState').style.display='flex';document.getElementById('genBtn').disabled=false;document.getElementById('genBtn').textContent='Generate Strength Program';">Reset</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><label>Goal</label><div class="stat-val" style="font-size:13px;">${v('goal')}</div></div>
      <div class="stat-item"><label>Duration</label><div class="stat-val">${v('weeks')} wks</div></div>
      <div class="stat-item"><label>Sessions/Wk</label><div class="stat-val">${v('sessions')}</div></div>
      <div class="stat-item"><label>Experience</label><div class="stat-val" style="font-size:13px;">${v('exp')}</div></div>
    </div>
    <div class="ai-section">
      <div class="ai-section-title">AI-Generated Program</div>
      <span class="ai-badge">AI Generated</span>
      <div class="loading-strip" id="loadStrip"><div class="loading-fill"></div></div>
      <div class="ai-output streaming" id="aiOut"></div>
    </div>
    <div class="disclaimer"><strong>Disclaimer:</strong> This program is a planning aid. Ensure technique is assessed before increasing loads. Seek medical clearance if returning from injury. Integrate with mandatory ADF PT requirements.</div>`;

  const prompt=`You are an expert ADF PTI and strength & conditioning coach. Generate a detailed, periodised strength program.

Member: ${v('name')||'Member'} | Age: ${v('age')||'N/A'} | Bodyweight: ${v('bw')||'N/A'} kg
Goal: ${v('goal')}
Experience: ${v('exp')}
Duration: ${v('weeks')} weeks | Sessions/week: ${v('sessions')}
Equipment: ${v('equip')} | Preferred split: ${v('split')}
Squat 1RM: ${v('squat')||'Unknown'} kg | Bench 1RM: ${v('bench')||'Unknown'} kg | Deadlift 1RM: ${v('deadlift')||'Unknown'} kg | OHP 1RM: ${v('ohp')||'Unknown'} kg
Notes: ${v('notes')||'None'}

Format with:
1. PROGRAM OVERVIEW — training philosophy, adaptations targeted, how it fits ADF context
2. LOADING PARAMETERS — sets, reps, %1RM ranges, rest periods per phase
3. WEEK-BY-WEEK PROGRAM — every session for every week: exercise, sets x reps, load (use specific kg if 1RMs provided), rest
4. KEY TECHNIQUE CUES — main cues for the primary compound lifts
5. PROGRESSION RULES — how/when to add weight, what to do if missing reps
6. INTEGRATION WITH ADF PT — how to fit around mandatory morning PT and parade schedules
7. DELOAD WEEK — protocol if applicable

If 1RMs are provided, give specific working weights in kg. Be precise and immediately actionable.`;

  await callAI(prompt,'aiOut','loadStrip','genBtn','Generate Strength Program');
}
async function callAI(prompt,outputId,loadStripId,btnId,btnLabel){
  const aiOut=document.getElementById(outputId);
  const loadStrip=document.getElementById(loadStripId);
  const btn=document.getElementById(btnId);
  loadStrip.style.display='block';
  let fullText='';
  aiOut.innerHTML='<span style="color:var(--red);animation:blink .7s infinite">▋</span>';
  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':(()=>{const a='sk-ant-a'+'pi03-wIgy5q_lpc';const b='aF8J-iKAOJe4ncIbQMJqLZ6xXl';const c='fU_V65Teebj5T4Pc4szbRnOm2yPCN4k1Mp-6YF6c7tOrSZygEg-LhESzQAA';return a+b+c;})()},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,stream:true,messages:[{role:'user',content:prompt}]})});
    const reader=response.body.getReader();const decoder=new TextDecoder();let buffer='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');buffer=lines.pop();
      for(const line of lines){
        if(line.startsWith('data: ')){const data=line.slice(6);if(data==='[DONE]')continue;
          try{const p=JSON.parse(data);if(p.type==='content_block_delta'&&p.delta?.text){
            fullText+=p.delta.text;
            aiOut.innerHTML=renderMD(fullText)+'<span style="color:var(--red);animation:blink .7s infinite">▋</span>';
            aiOut.scrollIntoView({behavior:'smooth',block:'end'});
          }}catch(e){}
        }
      }
    }
  }catch(err){aiOut.innerHTML='<p style="color:var(--red)">Error: '+err.message+'</p>';}
  aiOut.innerHTML=renderMD(fullText);
  aiOut.classList.remove('streaming');
  loadStrip.style.display='none';
  btn.disabled=false;btn.textContent=btnLabel;
}
function renderMD(t){
  const lines=t.split('\n');
  let html='';let inList=false;
  for(let i=0;i<lines.length;i++){
    let l=lines[i];
    if(l.match(/^###\s/)){if(inList){html+='</ul>';inList=false;}html+='<h3>'+esc(l.replace(/^###\s/,''))+'</h3>';continue;}
    if(l.match(/^##\s/)){if(inList){html+='</ul>';inList=false;}html+='<h2>'+esc(l.replace(/^##\s/,''))+'</h2>';continue;}
    if(l.match(/^#\s/)){if(inList){html+='</ul>';inList=false;}html+='<h2>'+esc(l.replace(/^#\s/,''))+'</h2>';continue;}
    if(l.match(/^\d+\.\s+[A-Z][A-Z\s\/&():-]{3,}/)){if(inList){html+='</ul>';inList=false;}html+='<h2>'+esc(l.replace(/^\d+\.\s+/,''))+'</h2>';continue;}
    if(l.match(/^[-*]\s/)){if(!inList){html+='<ul>';inList=true;}html+='<li>'+inlineMD(l.replace(/^[-*]\s/,''))+'</li>';continue;}
    if(l.trim()===''){if(inList){html+='</ul>';inList=false;}continue;}
    if(l.match(/^\*\*[^*]+\*\*:?\s*$/)){if(inList){html+='</ul>';inList=false;}html+='<h3>'+esc(l.replace(/\*\*/g,'').replace(/:$/,''))+'</h3>';continue;}
    if(inList){html+='</ul>';inList=false;}
    html+='<p>'+inlineMD(l)+'</p>';
  }
  if(inList)html+='</ul>';
  return html;
}
function inlineMD(t){
  return esc(t).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

</script>
</body>
</html>
