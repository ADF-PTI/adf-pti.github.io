<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADF PTI — Swim Program Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1f16;--ink2:#242920;--red:#c8392b;--red2:#e05a40;--orange:#e8a020;--cream:#f5f2eb;--sand:#ede8dc;--card:#ffffff;--border:#d0c8b8;--muted:#7a7060;--text:#1a1a16;--text2:#55504a;--radius:4px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
header{background:var(--ink);color:#fff;padding:0 2rem;display:flex;align-items:stretch;border-bottom:3px solid var(--red);}
.hflag{background:var(--red);width:6px;margin-right:1.5rem;}
.htext{padding:1.25rem 0;}
.hey{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:4px;}
header h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1;}
header h1 span{color:var(--red2);}
.hsub{font-size:12px;color:#aaa;margin-top:4px;font-weight:300;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hbadge{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:4px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#aaa;font-weight:700;}
.hlink{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:4px 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#aaa;font-weight:600;text-decoration:none;transition:background .15s;}
.hlink:hover{background:rgba(255,255,255,0.12);}
.layout{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 72px);}
.sidebar{background:var(--sand);border-right:1px solid var(--border);padding:1.5rem;overflow-y:auto;}
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:.75rem;padding-bottom:5px;border-bottom:1px solid var(--border);}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem;}
.fg label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink2);}
input,select,textarea{font-family:'Barlow',sans-serif;font-size:13.5px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);width:100%;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(200,57,43,.1);}
textarea{resize:vertical;min-height:60px;}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem;}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:.75rem;}
.btn-gen{width:100%;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .15s;margin-top:.75rem;}
.btn-gen:hover{background:var(--red);}
.btn-gen:disabled{background:#999;cursor:not-allowed;}
.output{padding:2rem;overflow-y:auto;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;text-align:center;opacity:.45;}
.empty-icon{width:64px;height:64px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1rem;font-size:28px;}
.empty h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.empty p{font-size:13px;color:var(--muted);}
.rpt-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--ink);}
.rpt-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1.1;}
.rpt-title span{color:var(--red);}
.rpt-meta{font-size:12px;color:var(--muted);margin-top:4px;}
.btn-sec{background:var(--card);color:var(--ink);border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-sec:hover{background:var(--sand);}
.stats-row{background:var(--ink);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;}
.stat-item label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#aaa;display:block;margin-bottom:3px;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--orange);}
.ai-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;}
.ai-section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);margin-bottom:.75rem;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.ai-section-title::before{content:'';display:inline-block;width:4px;height:13px;background:var(--red);border-radius:2px;flex-shrink:0;}
.ai-badge{display:inline-block;background:var(--red);color:#fff;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:2px;font-weight:700;margin-bottom:.75rem;}
.ai-output{font-size:13.5px;line-height:1.8;color:var(--text);white-space:pre-wrap;font-family:'Barlow',sans-serif;}
.ai-output.streaming::after{content:'▋';animation:blink .7s infinite;color:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.loading-strip{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:.75rem;display:none;}
.loading-fill{height:100%;background:var(--red);animation:sweep 1.5s ease-in-out infinite;}
@keyframes sweep{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.disclaimer{background:var(--sand);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-top:2rem;font-size:12px;color:var(--muted);font-style:italic;}
@media(max-width:900px){.layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="hflag"></div>
  <div class="htext">
    <div class="hey">Australian Defence Force</div>
    <h1>PTI <span>Swim</span> Program Builder</h1>
    <div class="hsub">AI-Powered Swimming Program Generator — All Levels & Standards</div>
  </div>
  <div class="hright">
    <a class="hlink" href="index.html">← Back to Tools</a>
    <div class="hbadge">AI Powered</div>
  </div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="slabel">Member Details</div>
    <div class="fgrid2">
      <div class="fg"><label>Name</label><input type="text" id="name" placeholder="e.g. AB Jones"></div>
      <div class="fg"><label>Unit / Service</label><input type="text" id="unit" placeholder="e.g. 2 CDG"></div>
    </div>

    <div class="slabel">Goal</div>
    <div class="fg">
      <select id="goal">
        <option>PFA Swim Standard</option>
        <option>Survival Swimming</option>
        <option>CDG Gate Test Preparation</option>
        <option>Navy Clearance Diver Standard</option>
        <option>Army Work Diver Standard</option>
        <option>General Swim Fitness</option>
        <option>Non-swimmer to Competent</option>
        <option>Water Confidence Building</option>
      </select>
    </div>

    <div class="slabel">Current Ability & Setup</div>
    <div class="fg"><label>Current Swim Ability</label>
      <select id="ability">
        <option>Non-swimmer / fear of water</option>
        <option>Can complete 50m freestyle</option>
        <option>Can complete 200m (slow)</option>
        <option selected>Can complete 400m</option>
        <option>Competent — 400m sub 12 min</option>
        <option>Strong swimmer — sub 10 min 400m</option>
      </select>
    </div>
    <div class="fgrid3">
      <div class="fg"><label>Pool Size</label>
        <select id="pool"><option>25m pool</option><option selected>50m pool</option><option>Open water</option><option>Variable</option></select>
      </div>
      <div class="fg"><label>Sessions/Wk</label>
        <select id="sessions"><option>2</option><option selected>3</option><option>4</option><option>5</option></select>
      </div>
      <div class="fg"><label>Duration (wks)</label>
        <select id="weeks"><option>4</option><option selected>8</option><option>12</option><option>16</option></select>
      </div>
    </div>
    <div class="fgrid2">
      <div class="fg"><label>Uniform Swims Required</label>
        <select id="uniform">
          <option>No — pool only</option>
          <option>Yes — overalls / EPE</option>
          <option>Yes — full kit + boots</option>
        </select>
      </div>
      <div class="fg"><label>Sex</label>
        <select id="sex"><option>Male</option><option>Female</option></select>
      </div>
    </div>
    <div class="fg"><label>Notes (dive requirements, breath hold, gate tests, fear of water)</label>
      <textarea id="notes" placeholder="e.g. Must include underwater swim. CDG gate 3 focus. Strong runner but weak swimmer. Fear of deep water."></textarea>
    </div>
    <button class="btn-gen" id="genBtn" onclick="generate()">Generate Swim Program</button>
  </div>

  <div class="output">
    <div class="empty" id="emptyState">
      <div class="empty-icon">🏊</div>
      <h2>No Program Generated</h2>
      <p>Enter your details and press<br>Generate Swim Program.</p>
    </div>
    <div id="reportArea" style="display:none;"></div>
  </div>
</div>

<script>
function v(id){return document.getElementById(id).value;}
async function generate(){
  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.textContent='Generating...';
  const now=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('emptyState').style.display='none';
  const ra=document.getElementById('reportArea');
  ra.style.display='block';
  ra.innerHTML=`
    <div class="rpt-header">
      <div><div class="rpt-title">Swim <span>Program</span></div><div class="rpt-meta">Generated ${now} — ${v('name')||'Member'} — ${v('weeks')} weeks — ${v('goal')}</div></div>
      <div style="display:flex;gap:8px;">
        <button class="btn-sec" onclick="window.print()">Print / Save PDF</button>
        <button class="btn-sec" onclick="document.getElementById('reportArea').style.display='none';document.getElementById('emptyState').style.display='flex';document.getElementById('genBtn').disabled=false;document.getElementById('genBtn').textContent='Generate Swim Program';">Reset</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><label>Goal</label><div class="stat-val" style="font-size:13px;">${v('goal')}</div></div>
      <div class="stat-item"><label>Current Ability</label><div class="stat-val" style="font-size:12px;">${v('ability').split(' ')[0]+'...'}</div></div>
      <div class="stat-item"><label>Duration</label><div class="stat-val">${v('weeks')} wks</div></div>
      <div class="stat-item"><label>Pool</label><div class="stat-val">${v('pool')}</div></div>
    </div>
    <div class="ai-section">
      <div class="ai-section-title">AI-Generated Swim Program</div>
      <span class="ai-badge">Powered by Claude AI</span>
      <div class="loading-strip" id="loadStrip"><div class="loading-fill"></div></div>
      <div class="ai-output streaming" id="aiOut"></div>
    </div>
    <div class="disclaimer"><strong>Safety Notice:</strong> All swim training must be conducted with a qualified lifeguard present or buddy system in place. Never train breath-holding techniques alone. Hyperventilation before underwater swimming is extremely dangerous.</div>`;

  const prompt=`You are an expert ADF Physical Training Instructor with specialist swim training knowledge. Generate a detailed swim program.

Member: ${v('name')||'Member'} | Unit: ${v('unit')||'N/A'} | Sex: ${v('sex')}
Goal: ${v('goal')}
Current ability: ${v('ability')}
Pool: ${v('pool')} | Sessions/week: ${v('sessions')} | Duration: ${v('weeks')} weeks
Uniform swims required: ${v('uniform')}
Notes: ${v('notes')||'None'}

Format with:
1. PROGRAM OVERVIEW — goal, progression approach, key focus areas
2. TARGET STANDARDS — specific ADF swim standards relevant to this goal (times, distances)
3. TECHNIQUE FOCUS — stroke efficiency, survival swimming, uniform swimming adaptation if relevant
4. WEEK-BY-WEEK PLAN — every session: set structure, distances, stroke type, rest intervals, target times
5. SPECIAL SKILLS PROGRESSION — breath hold, underwater swim, uniform swimming, water confidence (where relevant)
6. GATE TEST / ASSESSMENT PREP — specific drills for selection swim tests if applicable
7. SAFETY PROTOCOLS — buddy system requirements, hyperventilation risks, depth rules, PTI supervision requirements

Be specific with distances, times and intervals. Reference ADF standards. Emphasise safety throughout.`;

  await callAI(prompt,'aiOut','loadStrip','genBtn','Generate Swim Program');
}
async function callAI(prompt,outputId,loadStripId,btnId,btnLabel){const aiOut=document.getElementById(outputId);const loadStrip=document.getElementById(loadStripId);const btn=document.getElementById(btnId);loadStrip.style.display="block";try{const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,stream:true,messages:[{role:"user",content:prompt}]})});const reader=response.body.getReader();const decoder=new TextDecoder();let buffer="";while(true){const{done,value}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const lines=buffer.split("\n");buffer=lines.pop();for(const line of lines){if(line.startsWith("data: ")){const data=line.slice(6);if(data==="[DONE]")continue;try{const p=JSON.parse(data);if(p.type==="content_block_delta"&&p.delta?.text){aiOut.textContent+=p.delta.text;aiOut.scrollIntoView({behavior:"smooth",block:"end"});}}catch(e){}}}}}catch(err){aiOut.textContent="Error: "+err.message;}aiOut.classList.remove("streaming");loadStrip.style.display="none";btn.disabled=false;btn.textContent=btnLabel;}
</script>
</body>
</html>
